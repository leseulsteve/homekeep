# Sample Homekeep chore definitions for development and tests.

chores:
  empty_compost:
    name: Empty compost
    area_id: kitchen
    group_id: trash
    base_interval_days: 2
    min_interval_days: 1
    max_interval_days: 4
    estimated_minutes: 2
    energy: low
    visibility: medium
    health_weight: 1.4
    variants:
      normal:
        label: Empty compost
        credit: 1.0
    pairs_with:
      - wipe_kitchen_counters
      - take_out_kitchen_trash
    enabled: true

  wipe_kitchen_counters:
    name: Wipe kitchen counters
    area_id: kitchen
    group_id: surfaces
    base_interval_days: 2
    min_interval_days: 1
    max_interval_days: 5
    estimated_minutes: 5
    energy: normal
    visibility: high
    health_weight: 1.2
    variants:
      tiny:
        label: Wipe visible counters
        credit: 0.5
      normal:
        label: Wipe counters
        credit: 1.0
      deep:
        label: Clear and wipe counters
        credit: 1.3
    pairs_with:
      - empty_compost
      - start_dishwasher
    enabled: true

  start_dishwasher:
    name: Start dishwasher
    area_id: kitchen
    group_id: dishes
    base_interval_days: 1
    min_interval_days: 0.5
    max_interval_days: 2
    estimated_minutes: 3
    energy: low
    visibility: high
    health_weight: 1.0
    variants:
      normal:
        label: Start dishwasher
        credit: 1.0
    pairs_with:
      - wipe_kitchen_counters
    enabled: true

  clean_bathroom_sink:
    name: Clean bathroom sink
    area_id: bathroom
    group_id: bathroom_refresh
    base_interval_days: 5
    min_interval_days: 2
    max_interval_days: 10
    estimated_minutes: 6
    energy: normal
    visibility: high
    health_weight: 1.0
    variants:
      tiny:
        label: Wipe sink
        credit: 0.4
      normal:
        label: Clean sink and mirror
        credit: 1.0
      deep:
        label: Sink, mirror, counter, and cabinet fronts
        credit: 1.4
    pairs_with:
      - replace_bathroom_towels
      - restock_toilet_paper
    enabled: true

  replace_bathroom_towels:
    name: Replace bathroom towels
    area_id: bathroom
    group_id: linens
    base_interval_days: 4
    min_interval_days: 2
    max_interval_days: 7
    estimated_minutes: 3
    energy: low
    visibility: medium
    health_weight: 0.8
    variants:
      normal:
        label: Replace towels
        credit: 1.0
    pairs_with:
      - clean_bathroom_sink
    enabled: true
