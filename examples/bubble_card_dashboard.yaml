# Homekeep Bubble Card MVP dashboard example.
#
# Bubble Card verified capabilities used here:
# - pop-up cards for focused flows
# - button/name/state cards with call-service and navigate actions
# - select cards for input_select helper entities
# - sub-buttons for compact action rows
#
# Current Bubble Card/Home Assistant dashboard gap:
# Dashboard cards can call services, but this example does not rely on Bubble
# Card capturing Home Assistant service response payloads and binding returned
# snapshot_id, recommendation_id, session_id, or session_item_id into later
# buttons. Use small Home Assistant scripts/automations to bridge helper state
# and Homekeep service responses.
#
# Companion helpers expected by this dashboard:
# - input_select.homekeep_time_budget: 2, 5, 15, 30
# - input_select.homekeep_energy_level: low, normal, high, quiet
# - input_select.homekeep_goal: quick_wins, overdue, visible_impact,
#   prevent_future_mess, full_reset
# - input_select.homekeep_mood: auto, calm, focused, tired, overwhelmed,
#   energized
# - input_text.homekeep_recommendation_snapshot_id
# - input_text.homekeep_recommendation_id
# - input_text.homekeep_session_id
# - input_text.homekeep_session_item_id
# - input_text.homekeep_chore_id
# - input_text.homekeep_bonus_chore_id
#
# Companion scripts expected by this dashboard:
# - script.homekeep_generate_ready_now
# - script.homekeep_start_selected_recommendation
# - script.homekeep_complete_selected_session_item
# - script.homekeep_skip_selected_session_item
# - script.homekeep_snooze_selected_session_item
# - script.homekeep_end_session_completed
# - script.homekeep_offer_bonus_chore
# - script.homekeep_accept_bonus_chore
#
# Suggested bridge behavior:
# - homekeep_generate_ready_now reads the input_select helpers, calls
#   homekeep.generate_smart_chore_list, and stores the selected
#   snapshot_id/recommendation_id in input_text helpers.
# - homekeep_start_selected_recommendation reads the recommendation helper IDs,
#   calls homekeep.start_recommendation, and stores session_id plus the current
#   session item helper IDs from the returned materialized items.
# - item mutation scripts read session/chore/session_item helper IDs and call
#   complete_chore, skip_chore, or snooze_chore.

title: Homekeep
views:
  - title: Homekeep
    path: homekeep
    icon: mdi:broom
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: sensor.homekeep_home_health
            name: Home Health
            icon: mdi:home-heart
            show_state: true
            card_layout: large-2-rows
            sub_button:
              - entity: sensor.homekeep_due_chore_count
                name: Due
                icon: mdi:counter
                show_name: true
                show_state: true
                show_background: false
              - entity: sensor.homekeep_best_next_chore
                name: Next
                icon: mdi:creation
                show_name: true
                show_state: true
                show_background: false
              - entity: sensor.homekeep_next_calendar_context
                name: Calendar
                icon: mdi:calendar-sync
                show_name: true
                show_state: true
                show_background: false

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: I'm ready
            icon: mdi:play-circle
            button_action:
              tap_action:
                action: navigate
                navigation_path: '#homekeep-ready-now'
            sub_button:
              - name: Generate
                icon: mdi:auto-fix
                show_name: true
                tap_action:
                  action: call-service
                  service: script.homekeep_generate_ready_now
              - name: Active
                icon: mdi:playlist-check
                show_name: true
                tap_action:
                  action: navigate
                  navigation_path: '#homekeep-active-session'

          - type: todo-list
            entity: todo.homekeep_active_session
            title: Active Session

      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_time_budget
            name: Time
            icon: mdi:timer-outline

          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_energy_level
            name: Energy
            icon: mdi:lightning-bolt-outline

          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_goal
            name: Goal
            icon: mdi:target

          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_mood
            name: Mood
            icon: mdi:emoticon-outline

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Smart Chore List
            icon: mdi:clipboard-list-outline
            button_action:
              tap_action:
                action: call-service
                service: script.homekeep_generate_ready_now
            sub_button:
              - name: Refresh
                icon: mdi:refresh
                show_name: true
                tap_action:
                  action: call-service
                  service: script.homekeep_generate_ready_now
              - name: Start
                icon: mdi:play
                show_name: true
                tap_action:
                  action: call-service
                  service: script.homekeep_start_selected_recommendation

          - type: todo-list
            entity: todo.homekeep_recommendations
            title: Recommendations

    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#homekeep-ready-now'
        name: Ready Now
        icon: mdi:broom
        popup_mode: fit-content
        cards:
          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_time_budget
            name: Time
            icon: mdi:timer-outline

          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_energy_level
            name: Energy
            icon: mdi:lightning-bolt-outline

          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_goal
            name: Goal
            icon: mdi:target

          - type: custom:bubble-card
            card_type: select
            entity: input_select.homekeep_mood
            name: Mood
            icon: mdi:emoticon-outline

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Generate
            icon: mdi:auto-fix
            button_action:
              tap_action:
                action: call-service
                service: script.homekeep_generate_ready_now

          - type: entities
            title: Selected Recommendation
            entities:
              - entity: sensor.homekeep_best_next_chore
                name: Best next chore
              - entity: input_text.homekeep_recommendation_snapshot_id
                name: Snapshot
              - entity: input_text.homekeep_recommendation_id
                name: Recommendation

          - type: todo-list
            entity: todo.homekeep_recommendations
            title: Recommendations

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Start
            icon: mdi:play
            button_action:
              tap_action:
                action: call-service
                service: script.homekeep_start_selected_recommendation

      - type: custom:bubble-card
        card_type: pop-up
        hash: '#homekeep-active-session'
        name: Active Session
        icon: mdi:playlist-check
        popup_mode: fit-content
        cards:
          - type: todo-list
            entity: todo.homekeep_active_session
            title: Active Session

          - type: entities
            title: Current Session Item
            entities:
              - entity: input_text.homekeep_session_id
                name: Session
              - entity: input_text.homekeep_chore_id
                name: Chore
              - entity: input_text.homekeep_session_item_id
                name: Session item

          - type: custom:bubble-card
            card_type: sub-buttons
            hide_main_background: true
            sub_button:
              bottom:
                - name: Done
                  icon: mdi:check
                  show_name: true
                  tap_action:
                    action: call-service
                    service: script.homekeep_complete_selected_session_item
                - name: Skip
                  icon: mdi:skip-next
                  show_name: true
                  tap_action:
                    action: call-service
                    service: script.homekeep_skip_selected_session_item
                - name: Snooze
                  icon: mdi:clock-plus-outline
                  show_name: true
                  tap_action:
                    action: call-service
                    service: script.homekeep_snooze_selected_session_item
            rows: 1

          - type: custom:bubble-card
            card_type: sub-buttons
            hide_main_background: true
            sub_button:
              bottom:
                - name: Done for now
                  icon: mdi:stop-circle-outline
                  show_name: true
                  tap_action:
                    action: call-service
                    service: script.homekeep_end_session_completed
                - name: One more
                  icon: mdi:plus-circle-outline
                  show_name: true
                  tap_action:
                    action: call-service
                    service: script.homekeep_offer_bonus_chore
            rows: 1

          - type: entities
            title: One More
            entities:
              - entity: input_text.homekeep_bonus_chore_id
                name: Bonus chore

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Accept one more
            icon: mdi:plus-check
            button_action:
              tap_action:
                action: call-service
                service: script.homekeep_accept_bonus_chore

      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        highlight_current_view: true
        1_name: Ready
        1_icon: mdi:play-circle
        1_link: '#homekeep-ready-now'
        2_name: Active
        2_icon: mdi:playlist-check
        2_link: '#homekeep-active-session'
        3_name: Lists
        3_icon: mdi:format-list-checks
        3_link: /todo
